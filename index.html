<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="google-site-verification" content="7pGHe2_gYBJ2YrnA7edIw_4EUE-kNeD1-0PUhIM8pjg"/>
  <title data-i18n="nav.title"></title>
  <link rel="stylesheet" href="assets/css/main.css">
  <script src="assets/js/main.js"></script>
</head>
<body>

  <!-- NAV -->
  <nav>
    <span class="nav-logo">T<span>.</span>mkv</span>
    <div class="nav-right">
      <ul class="nav-links">
        <li><a href="#about" data-i18n="nav.about"></a></li>
        <li><a href="#apps" data-i18n="nav.apps"></a></li>
        <li><a href="#contact" data-i18n="nav.contact"></a></li>
      </ul>
      <div class="lang-toggle">
        <button id="btn-ru" class="active" onclick="setLang('ru')">RU</button>
        <button id="btn-en" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <div id="hero">
    <div class="hero-grid">
      <div class="hero-left">
        <p class="hero-eyebrow" data-i18n="hero.eyebrow"></p>
        <h1 class="hero-name" data-i18n="hero.name"></h1>
        <p class="hero-role" data-i18n="hero.role"></p>
        <p class="hero-desc" data-i18n="hero.desc"></p>
        <div class="hero-actions">
          <a href="#apps" class="btn-primary">
            <span data-i18n="hero.btn.apps"></span>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </a>
          <a href="#contact" class="btn-ghost" data-i18n="hero.btn.contact"></a>
        </div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- ABOUT -->
  <section id="about">
    <div class="container">
      <div class="reveal">
        <p class="section-label" data-i18n="about.label"></p>
        <h2 class="section-title" data-i18n="about.title"></h2>
      </div>
      <div class="about-body reveal">
        <p data-i18n="about.p1"></p>
        <p data-i18n="about.p2"></p>
        <p data-i18n="about.p3"></p>
        <div class="skills-wrap">
          <span class="skill-chip">Swift</span>
          <span class="skill-chip">SwiftUI</span>
          <span class="skill-chip">UIKit</span>
          <span class="skill-chip">Objective-C</span>
          <span class="skill-chip">WidgetKit</span>
          <span class="skill-chip">Live Activities</span>
          <span class="skill-chip">AVAudioSession</span>
          <span class="skill-chip">Core Data</span>
          <span class="skill-chip">Realm</span>
          <span class="skill-chip">Unit Testing</span>
          <span class="skill-chip">Snapshot Tests</span>
          <span class="skill-chip">Swinject</span>
          <span class="skill-chip">Websockets</span>
          <span class="skill-chip">App Store Connect</span>
        </div>
      </div>
    </div>
  </section>

  <div class="divider"></div>

  <!-- APPS -->
  <section id="apps">
    <div class="container">
      <div class="reveal" style="margin-bottom:3rem;">
        <p class="section-label" data-i18n="apps.label"></p>
        <h2 class="section-title" data-i18n="apps.title"></h2>
      </div>
      <div class="apps-grid">

        <!-- SourdoughCooker -->
        <a href="apps/sourdough-cooker/index.html" class="app-link">
          <div class="app-card reveal">
            <div class="app-icon-box bread">
              <img src="assets/sourdoughcooker-icon.jpeg" alt="SourdoughCooker" class="app-icon">
            </div>
            <div class="app-info">
              <p class="app-cat" data-i18n="sc.cat"></p>
              <h3>SourdoughCooker</h3>
              <p data-i18n="sc.desc"></p>
            </div>
            <div class="app-badge-wrap">
              <img id="appstore-badge"
                  src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/ru-ru"
                  alt="Download on the App Store"
                  style="height: 40px;">
            </div>
          </div>
        </a>

        <!-- APP 2: раскомментируй когда будет готово
        <div class="app-card reveal">
          <div class="app-icon-box blue">🔵</div>
          <div class="app-info">
            <p class="app-cat" data-i18n="..."></p>
            <h3>Название</h3>
            <p data-i18n="..."></p>
          </div>
          <div class="app-badge-wrap">
            <span class="badge-soon" data-i18n="..."></span>
          </div>
        </div>
        -->

      </div>
    </div>
  </section>

  <div class="divider"></div>

  <!-- CONTACT -->
  <section id="contact">
    <div class="container reveal">
      <p class="section-label" data-i18n="contact.label"></p>
      <h2 class="contact-title" data-i18n="contact.title"></h2>
      <p class="contact-sub" data-i18n="contact.sub"></p>
      <div class="contact-row">
        <a href="mailto:tyh94@mail.ru" class="clink primary">

          tyh94@mail.ru
        </a>
        <a href="https://t.me/TyMkv" class="clink outline" target="_blank">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248-2.04 9.61c-.152.678-.554.843-1.122.524l-3.1-2.285-1.495 1.438c-.165.165-.304.304-.624.304l.223-3.16 5.75-5.193c.25-.223-.054-.347-.387-.124L6.976 14.37l-3.06-.956c-.665-.208-.678-.665.14-.984l11.948-4.605c.554-.2 1.039.135.558 1.423z"/></svg>

  <footer>
    <p data-i18n="footer.copy"></p>
  </footer>
</body>
</html>
